name: Telegram Channel Bot

on:
  schedule:
    - cron: '0 */6 * * *' # يشتغل كل 6 ساعات تلقائياً
  workflow_dispatch: # للتشغيل اليدوي للتجربة

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install requests

    - name: Run Bot
      env:
        # هنا غيرنا الأسماء عشان يقرأ البوت الجديد من الـ Secrets اللي عملناها
        NEW_TELEGRAM_BOT_TOKEN: ${{ secrets.NEW_TELEGRAM_BOT_TOKEN }}
        NEW_TELEGRAM_CHAT_ID: ${{ secrets.NEW_TELEGRAM_CHAT_ID }} 
      run: python bot.py
